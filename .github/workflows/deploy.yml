name: CI/CD Frontend - Deploy to Public EC2

on:
  push:
    branches: [ deploy ] # Se activa solo al hacer push a la rama deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/front-eval2:latest

  deploy-to-public-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy Directly to Public Server
      uses: appleboy/ssh-action@master
      with:
        host: '32.199.17.172'               # IP pública de tu servidor Front
        username: 'ec2-user'
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/ec2-user/Front_Eval2
          git pull origin deploy
          sudo docker compose pull
          sudo docker compose up -d --remove-orphans
